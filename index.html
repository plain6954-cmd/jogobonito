<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOGO BONITO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <div class="logo">JOGO <span>BONITO</span></div>
        <ul class="nav-links">
            <li><a href="#" data-target="players-view" class="active">Players</a></li>
            <li><a href="#" data-target="teams-view">Teams</a></li>
            <li><a href="#" data-target="matches-view">Matches</a></li>
            <li><a href="#" data-target="table-view">Table</a></li>
        </ul>
        <button id="admin-toggle-btn" class="btn-outline">Admin Login</button>
    </nav>

    <!-- Admin Login Modal -->
    <div id="login-modal" class="modal">
        <div class="modal-content glass">
            <span class="close-btn">&times;</span>
            <h2>Admin Access</h2>
            <p>Enter password to manage the league</p>
            <input type="password" id="admin-password" placeholder="Password" />
            <button id="login-submit-btn" class="btn-primary">Login</button>
            <p id="login-error" class="error-text"></p>
        </div>
    </div>

    <!-- Main Content Area -->
    <main class="content-area">
        
        <!-- Players View -->
        <section id="players-view" class="view-section active">
            <div class="header-action">
                <h2>Players Universe</h2>
                <div class="filter-group">
                    <select id="player-filter">
                        <option value="ALL">All Positions</option>
                        <option value="ATT">Attackers</option>
                        <option value="MID">Midfielders</option>
                        <option value="DEF">Defenders</option>
                        <option value="GK">Goalkeepers</option>
                    </select>
                </div>
            </div>

            <!-- Admin Add Player Form -->
            <div id="add-player-form-container" class="admin-only hidden glass p-4 mb-4">
                <h3>Add New Player</h3>
                <form id="add-player-form" class="form-grid">
                    <input type="text" id="p-name" placeholder="Player Name" required />
                    <input type="number" id="p-rating" placeholder="Rating (1-99)" min="1" max="99" required />
                    <select id="p-pos" required>
                        <option value="" disabled selected>Position</option>
                        <option value="ATT">Attacker (ST, LW, RW)</option>
                        <option value="MID">Midfielder (CM, CDM, CAM)</option>
                        <option value="DEF">Defender (CB, LB, RB)</option>
                        <option value="GK">Goalkeeper (GK)</option>
                    </select>
                    <input type="url" id="p-photo" placeholder="Photo URL (Google Drive/Image link)" />
                    <button type="submit" class="btn-primary">Add Player</button>
                </form>
            </div>

            <!-- Player Cards Grid -->
            <div id="players-grid" class="players-grid">
                <!-- Player cards injected here -->
            </div>
        </section>

        <!-- Teams View -->
        <section id="teams-view" class="view-section hidden">
            <h2>League Teams</h2>
            
            <div id="add-team-form-container" class="admin-only hidden glass p-4 mb-4">
                <h3>Add New Team</h3>
                <form id="add-team-form" class="form-grid">
                    <input type="text" id="t-name" placeholder="Team Name" required />
                    <input type="text" id="t-manager" placeholder="Manager Name" required />
                    <button type="submit" class="btn-primary">Add Team</button>
                </form>
            </div>

            <div id="teams-list" class="teams-list">
                <!-- Teams injected here -->
            </div>
        </section>

        <!-- Matches View -->
        <section id="matches-view" class="view-section hidden">
            <h2>Fixtures & Results</h2>
            <div class="glass p-4 text-center">
                <p>Matches will be displayed here.</p>
            </div>
        </section>

        <!-- Table View -->
        <section id="table-view" class="view-section hidden">
            <h2>League Table</h2>
            <div class="glass p-4 text-center">
                <p>Table calculation to be added later.</p>
            </div>
        </section>

    </main>

    <script src="app.js"></script>
</body>
</html>
